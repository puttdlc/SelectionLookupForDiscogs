<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 300px;
        background: #1a1a1a;
        color: #f0f0f0;
        font-family: Arial, sans-serif;
        animation: popIn 0.4s ease-out;
      }

      @keyframes popIn {
        0%  { opacity: 0; transform: scale(0.9); }
        70% { transform: scale(1.02); }
        100%{ opacity: 1; transform: scale(1); }
      }

      .header {
        background: #242424;
        border-bottom: 1px solid #333;
        padding: 16px;
        animation: slideDown 0.4s ease-out;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .app-title {
        font-size: 15px;
        font-weight: bold;
      }

      .app-subtitle {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }

      .content {
        padding: 20px 16px;
      }

      .label {
        font-size: 12px;
        color: #888;
        margin-bottom: 8px;
        animation: fadeUp 0.4s ease-out 0.1s both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .input-wrapper {
        position: relative;
        animation: fadeUp 0.4s ease-out 0.2s both;
      }

      .token-input {
        width: 100%;
        padding: 10px;
        padding-left: 32px;
        padding-right: 36px;
        background: #2e2e2e;
        border: 1px solid #444;
        border-radius: 8px;
        color: #f0f0f0;
        font-size: 13px;
        font-family: Arial, sans-serif;
        outline: none;
        transition: border-color 0.2s;
      }

      .token-input::placeholder {
        color: #666;
      }

      .token-input:focus {
        border-color: #f3a125;
        box-shadow: 0 0 0 3px rgba(243, 161, 37, 0.2);
      }

      .lock-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        color: #888;
        pointer-events: none;
      }

      .input-wrapper::after {
        content: "";
        position: absolute;
        right: 28px;
        top: 2px;
        bottom: 2px;
        width: 32px;
        background: linear-gradient(to right, transparent, #2e2e2e);
        pointer-events: none;
      }

      .toggle-btn {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #888;
        padding: 4px;
        display: flex;
      }

      .toggle-btn:hover {
        color: #f3a125;
      }

      .divider {
        height: 1px;
        background: #333;
        margin: 16px 0;
        animation: fadeUp 0.4s ease-out 0.3s both;
      }

      #saveBtn {
        width: 100%;
        padding: 10px;
        background: #f3a125;
        color: #1a1a1a;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: bold;
        font-family: Arial, sans-serif;
        cursor: pointer;
        transition: background 0.2s;
        animation: bounceIn 0.5s ease-out 0.35s both;
      }

      @keyframes bounceIn {
        0%   { opacity: 0; transform: scale(0.8); }
        60%  { transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
      }

      #saveBtn:hover {
        background: #ffb84d;
      }

      #saveBtn:active {
        transform: scale(0.97);
      }

      #status {
        font-size: 12px;
        margin-top: 10px;
        text-align: center;
      }

      #status.success {
        color: #4caf6e;
        animation: bounceIn 0.3s ease-out;
      }

      #status.error {
        color: #e05a5a;
        animation: shake 0.4s ease-out;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25%       { transform: translateX(-5px); }
        75%       { transform: translateX(5px); }
      }

      .footer {
        padding: 12px 16px;
        border-top: 1px solid #333;
        display: flex;
        justify-content: center;
        gap: 8px;
        animation: fadeUp 0.4s ease-out 0.4s both;
      }

      .footer a {
        font-size: 11px;
        color: #888;
        text-decoration: none;
      }

      .footer a:hover {
        color: #f3a125;
      }

      .disclaimer {
        text-align: center;
        font-size: 10px;
        color: #555;
        padding: 0 16px 10px;
        animation: fadeUp 0.4s ease-out 0.5s both;
      }

      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 0 12px;
        animation: fadeUp 0.4s ease-out 0.3s both;
      }

      .setting-label {
        font-size: 13px;
        font-weight: bold;
      }

      .setting-desc {
        font-size: 11px;
        color: #666;
        margin-top: 2px;
      }

      .switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #444;
        border-radius: 20px;
        transition: background 0.2s;
      }

      .slider::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 3px;
        top: 3px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      .switch input:checked + .slider {
        background: #f3a125;
      }

      .switch input:checked + .slider::before {
        transform: translateX(16px);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="app-title">Selection Lookup for Discogs</div>
      <div class="app-subtitle">Settings</div>
    </div>

    <div class="content">
      <div class="label">Personal Access Token</div>

      <div class="input-wrapper">
        <input type="password" id="tokenInput" class="token-input" placeholder="Paste your token here..." />
        <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <button class="toggle-btn" id="toggleVisibility" title="Show/hide token">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="divider"></div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Instant Select Lookup</div>
          <div class="setting-desc">Auto-query any highlighted text</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="instantToggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="divider" style="animation-delay: 0.35s"></div>

      <button id="saveBtn">Save Token</button>
      <div id="status"></div>
    </div>

    <div class="footer">
      <a href="https://www.discogs.com/settings/developers" target="_blank">Get API Token</a>
      <span style="color: #555">·</span>
      <a href="https://www.discogs.com" target="_blank">Discogs</a>
    </div>

    <div class="disclaimer">Not officially affiliated with Discogs</div>

    <script src="popup.js"></script>
  </body>
</html>
